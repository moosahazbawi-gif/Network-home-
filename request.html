<h1>طلب خدمة</h1>

<form action="https://formsubmit.co/youremail@gmail.com" method="POST">

  <input type="text" name="name" placeholder="الاسم" required><br><br>

  <input type="text" name="phone" placeholder="رقم الهاتف" required><br><br>

  <select name="service">
    <option>شبكات</option>
    <option>أنظمة</option>
    <option>سيرفرات</option>
    <option>برمجيات</option>
  </select><br><br>

  <textarea name="message" placeholder="تفاصيل الطلب"></textarea><br><br>

  <button type="submit">إرسال الطلب</button>

</form>
