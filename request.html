<h1>طلب خدمة</h1>

<form onsubmit="sendToWhatsApp(); return false;">

  <input type="text" id="name" placeholder="الاسم" required><br><br>

  <input type="text" id="phone" placeholder="رقم الهاتف" required><br><br>

<head>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

  <select id="service">
    <option>شبكات</option>
    <option>أنظمة</option>
    <option>سيرفرات</option>
    <option>برمجيات</option>
    <option>تركيب معدات</option>
  </select><br><br>

  <textarea id="message" placeholder="تفاصيل الطلب"></textarea><br><br>

  <button type="submit">إرسال عبر واتساب</button>

</form>
