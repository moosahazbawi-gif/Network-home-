<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <title>سیستم درخواست | Network Home</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar">
  <div class="logo">NETWORK<span>HOME</span></div>
  <ul>
    <li><a href="index.html">خانه</a></li>
    <li><a href="services.html">خدمات</a></li>
    <li><a href="contact.html">ارتباط</a></li>
  </ul>
</nav>

<section class="hero" style="height:40vh;">
  <h1>سیستم ثبت درخواست</h1>
  <p>ثبت و مدیریت درخواست‌های مشتریان</p>
</section>

<section class="contact">

  <div class="grid">

    <!-- FORM -->
    <div class="card">
      <h2>ثبت درخواست جدید</h2>

      <form onsubmit="submitRequest(event)">

        <input id="name" type="text" placeholder="نام" required>
        <input id="phone" type="text" placeholder="شماره تماس" required>

        <select id="service" required>
          <option value="">انتخاب خدمت</option>
          <option>شبکه</option>
          <option>سرور</option>
          <option>پشتیبانی فنی</option>
          <option>طراحی سایت</option>
        </select>

        <textarea id="message" rows="4" placeholder="توضیحات..." required></textarea>

        <button class="btn primary" type="submit">ارسال درخواست</button>
      </form>
    </div>

    <!-- INFO -->
    <div class="card">
      <h2>سیستم مدیریت</h2>
      <p>تمام درخواست‌ها ذخیره می‌شوند و قابل مشاهده در پنل مدیریت هستند.</p>
    </div>

  </div>

</section>

<script src="script.js"></script>
</body>
</html>
